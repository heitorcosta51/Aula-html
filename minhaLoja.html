<body>



    <header>

            <h1>Minha Loja</h1>

        <nav>
            <ul>
                <li><a href="#inicio">Inicio</a></li>
                <li><a href="#produtos">produtos</a></li>
                <li><a href="#categorias">categorias</a></li>
                <li><a href="#contato">Contato</a></li>
            </ul>
        </nav>
        <label for="buscar">Buscar produto:</label>
        <input type="search" id="buscar" name="buscar" placeholder="Digite o nome do produto">
        <input type="submit" value="Buscar" id="button" name="button">
    </header>

    <main>

        <hr>

        <section id="inicio">
            <h2>Bem vindo a nossa loja!</h2>

            <img src="img/Loja.webp" alt="loja" width="500" height="300">
        </section>


        <section id="categorias">
            <h2>Categorias</h2>

            <hr>

            <ul>
                <li>Roupas</li>
                <li>Calçados</li>
                <li>Acessórios</li>
            </ul>
        </section>

        <section id="produtos">
            <h2>Nossos produtos</h2>

            <table border="1">

            </table>
        </section>


        <section>
            <h1>Fale Conosco</h1>

            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>

            <br><br>

            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" placeholder="Digite seu email" required>

            <br><br>

            <label for="assunto">Assunto:</label>
            <input type="text" id="assunto" name="assunto" placeholder="Digite o assunto" required>

            <br><br>

            <label for="mensagem">Mensagem:</label>
            <br>

            <textarea id="mensagem" name="mensagem" placeholder="Digite sua mensagem" required></textarea>

            <br><br>

            <button type="submit">Enviar</button>
        </section>

    </main>


    <footer>
        <p>© 2024 Minha Loja. Todos os direitos reservados.</p>
    </footer>

</body>
