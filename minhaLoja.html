<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>



    <header>

        <h1>
            <img src="img/caveira.gif" alt="caveira" width="50" height="50">

            Minha Loja

            <img src="img/caveira.gif" alt="caveira" width="50" height="50">
        </h1>

        <nav>
            <ul>
                <li><a href="#inicio">Inicio</a></li>
                <li><a href="#produtos">produtos</a></li>
                <li><a href="#categorias">categorias</a></li>
                <li><a href="#contato">Contato</a></li>
            </ul>
        </nav>
        <label for="buscar">Buscar produto:</label>
        <input type="search" id="buscar" name="buscar" placeholder="Digite o nome do produto">

        <input type="submit" value="Buscar" id="btn-buscar">
    </header>

    <main>

        <hr>

        <section id="inicio">
            <h2>Bem vindo a nossa loja!</h2>

            <img src="img/killbill.jpg" id="imagem-filme" alt="loja" width="500" height="300">
        </section>


        <section id="categorias">
            <h2>Categorias</h2>

            <nav>
                <ul>
                    <li>Pokemon</li>
                    <li>Dragão</li>
                    <li>Armas</li>
                </ul>
            </nav>
        </section>

        <hr>

        <section id="produtos">
            <h2>Nossos produtos</h2>

            <table border="1">
                <tr class="titulo-valor">
                    <th>Nome</th>
                    <th>Valor</th>
                    <th>Foto</th>
                </tr>
                <tr class="dragao">
                    <td>Dragão</td>
                    <td>R$ 150.000,00</td>
                    <td><img src="img/dragao.gif" alt="Dragão" width="100" height="100"></td>
                </tr>
                <tr class="pokemon">
                    <td>Pokemon</td>
                    <td>R$ 4000,00</td>
                    <td><img src="img/Ghastly.gif" alt="pokemon" width="100" height="100"></td>
                </tr>
                </tr>
                <tr class="katana">
                    <td>Katana</td>
                    <td>R$ 550,00</td>
                    <td><img src="img/katana.gif" alt="espada" width="100" height="100"></td>
                </tr>
            </table>
        </section>

        <hr>

        <section>
            <h1>Fale Conosco</h1>

            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>

            <br><br>

            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" placeholder="Digite seu email" required>

            <br><br>

            <label for="assunto">Assunto:</label>
            <input type="text" id="assunto" name="assunto" placeholder="Digite o assunto" required>

            <br><br>

            <label for="mensagem">Mensagem:</label>
            <br>

            <textarea id="mensagem" name="mensagem" placeholder="Digite sua mensagem" required></textarea>

            <br><br>

            <button type="submit">Enviar</button>
        </section>

    </main>


    <footer>
        <p>© 2026 Minha Loja. Todos os direitos reservados.</p>
    </footer>

</body>
